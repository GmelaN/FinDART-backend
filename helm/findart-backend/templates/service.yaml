apiVersion: v1
kind: Service

metadata:
  name: {{ include "findart-backend.fullname" . }}
  labels:
    {{- include "findart-backend.labels" . | nindent 4 }}

spec:
  type: {{ .Values.service.type }}

  selector:
    {{- include "findart-backend.selectorLabels" . | nindent 4 }}

  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP