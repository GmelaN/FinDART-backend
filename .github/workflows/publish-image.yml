name: Publish Findart Image

on:
  push:
    branches:
      - main
      - master
    paths-ignore:
      - "helm/findart-backend/values.yaml"

  workflow_dispatch:

concurrency:
  group: findart-image-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: gmelan/findart-backend

jobs:
  test-and-publish:
    name: Test and publish OCI image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "25"
          cache: gradle

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Run tests
        run: ./gradlew clean test --no-daemon

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push OCI image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.title=findart
          cache-from: type=gha
          cache-to: type=gha,mode=max


      - name: Update Helm image tag
        shell: bash
        run: |
          VALUES_FILE="helm/findart-backend/values.yaml"

          sed -i -E \
            's|^  tag:.*|  tag: "'"${GITHUB_SHA}"'"|' \
            "${VALUES_FILE}"

          echo "Updated image configuration:"
          grep -A 3 '^image:' "${VALUES_FILE}"

      - name: Commit Helm image tag
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email \
            "41898282+github-actions[bot]@users.noreply.github.com"

          git add helm/findart-backend/values.yaml

          if git diff --cached --quiet; then
            echo "Image tag is already up to date."
            exit 0
          fi

          git commit -m "deploy: update image to ${GITHUB_SHA::7} [skip ci]"
          git push origin HEAD:main